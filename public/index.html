<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HS-Agency OS · Harshada Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F2;--bg2:#EFECE8;--bg3:#E8E4DE;
  --surface:#FFFFFF;--surface2:#FAFAF8;
  --border:#E2DDD8;--border2:#D4CFC9;
  --ink:#1A1714;--ink2:#4A4540;--ink3:#8A8480;
  --accent:#0F766E;--accent2:#115E59;--accentBg:#E6FFFB;
  --red:#C0392B;--redBg:#FDECEA;
  --amber:#B8860B;--amberBg:#FDF6E3;
  --blue:#2563EB;--blueBg:#EFF6FF;
  --purple:#7C3AED;--purpleBg:#F5F3FF;
  --sidebar:220px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Geist',system-ui}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--surface);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:28px 28px}

.sidebar-brand{padding:16px 14px 10px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.brand-icon{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Instrument Serif',serif;font-size:14px;font-style:italic;flex-shrink:0}
.brand-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.brand-sub{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}

.nav-section{padding:10px 10px 4px}
.nav-label{font-size:9px;font-weight:500;color:var(--ink3);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;padding:0 6px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink2);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--ink)}
.nav-item.active{background:var(--surface);color:var(--ink);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-count{margin-left:auto;background:var(--bg3);color:var(--ink3);font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:10px}

.sidebar-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.footer-user{display:flex;align-items:center;gap:9px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:var(--ink)}
.user-role{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}

.page-title{font-family:'Instrument Serif',serif;font-size:17px;color:var(--ink);font-style:italic}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;background:none;border:1px solid var(--border);color:var(--ink2)}
.tb-btn.primary{background:var(--ink);color:#fff;border:none}
.tb-btn:hover{background:var(--bg2)}

.page-header{margin-bottom:22px;animation:fadeIn .3s ease}
.page-emoji{font-size:28px;margin-bottom:8px}
.page-h1{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;color:var(--ink);letter-spacing:-.02em;margin-bottom:4px}
.page-desc{font-size:13px;color:var(--ink3);line-height:1.6}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;animation:fadeIn .4s ease}
.stat-val{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink);font-style:italic;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeIn .4s ease .1s both}
.table-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13px;font-weight:500;color:var(--ink)}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:500;color:var(--ink3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:10px 14px;font-size:13px;color:var(--ink2);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;font-family:'DM Mono',monospace}
.badge.green{background:var(--accentBg);color:var(--accent)}
.badge.red{background:var(--redBg);color:var(--red)}
.badge.amber{background:var(--amberBg);color:var(--amber)}
.badge.blue{background:var(--blueBg);color:var(--blue)}
.badge.grey{background:var(--bg3);color:var(--ink3)}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;animation:fadeIn .3s ease}
.kanban-col{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:11px;font-weight:600;color:var(--ink2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.col-count{background:var(--bg3);color:var(--ink3);font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:8px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:all .2s;animation:slideIn .3s ease}
.kanban-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.card-title{font-size:12.5px;font-weight:500;color:var(--ink);margin-bottom:6px;line-height:1.4}

.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.inv-val{font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;margin-bottom:2px}
.inv-label{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.inv-val.green{color:var(--accent)}

.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:24px;color:var(--ink3);font-size:13px}
.loading::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:pulse 1s infinite}

.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--ink2);font-size:18px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.overlay.open{display:block}

@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .main{width:100%}
  .content{padding:16px}
  .mobile-menu-btn{display:flex!important}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">H</div>
      <div>
        <div class="brand-name">AI Agency OS</div>
        <div class="brand-sub">Harshada Solutions</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Workspace</div>
      <div class="nav-item active" onclick="showPage('crm',this)">
        <span class="nav-icon">👥</span> CRM
        <span class="nav-count" id="crm-count">—</span>
      </div>
      <div class="nav-item" onclick="showPage('projects',this)">
        <span class="nav-icon">📋</span> Projects
        <span class="nav-count" id="proj-count">—</span>
      </div>
      <div class="nav-item" onclick="showPage('invoices',this)">
        <span class="nav-icon">💰</span> Invoices
        <span class="nav-count" id="inv-count">—</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="footer-user">
        <div class="user-avatar">H</div>
        <div>
          <div class="user-name">Harshada</div>
          <div class="user-role">Owner · Admin</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
      <span class="page-title" id="topbar-title">CRM · Clients</span>
      <div class="topbar-right">
        <button class="tb-btn primary">+ New</button>
      </div>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let CRM_DATA = [];
let PROJECTS = [];
let INVOICES = [];
let dataLoaded = false;

// ── API CALLS ──────────────────────────────────────────────────────────────────
async function fetchFromAPI(endpoint) {
  try {
    const response = await fetch(`/api/${endpoint}`);
    if (!response.ok) throw new Error(`API error: ${response.status}`);
    return await response.json();
  } catch (err) {
    console.error(`Error fetching ${endpoint}:`, err);
    return { results: [] };
  }
}

function getPropertyValue(properties, propName) {
  const prop = properties[propName];
  if (!prop) return null;
  if (prop.type === 'title') return prop.title[0]?.plain_text || '';
  if (prop.type === 'rich_text') return prop.rich_text[0]?.plain_text || '';
  if (prop.type === 'phone_number') return prop.phone_number || '';
  if (prop.type === 'number') return prop.number;
  if (prop.type === 'select') return prop.select?.name || '';
  if (prop.type === 'date') return prop.date?.start || '';
  return '';
}

// ── LOAD DATA ──────────────────────────────────────────────────────────────────
async function loadData() {
  const clients = await fetchFromAPI('notion-agent?database=clients');
  const projects = await fetchFromAPI('notion-agent?database=projects');
  const invoices = await fetchFromAPI('notion-agent?database=invoices');

  // EXACT property names for CLIENTS
  CRM_DATA = clients.results?.map(p => ({
    id: p.id,
    name: getPropertyValue(p.properties, 'Client Name'),
    phone: getPropertyValue(p.properties, 'Phone'),
    status: getPropertyValue(p.properties, 'Status'),
    value: getPropertyValue(p.properties, 'Deal Value'),
    lastContacted: getPropertyValue(p.properties, 'Last Contacted'),
    nextAction: getPropertyValue(p.properties, 'Next Action'),
  })).filter(c => c.name) || [];

  // EXACT property names for PROJECTS
  PROJECTS = projects.results?.map(p => ({
    id: p.id,
    name: getPropertyValue(p.properties, 'Project Name'),
    client: getPropertyValue(p.properties, 'Client'),
    status: getPropertyValue(p.properties, 'Status'),
    due: getPropertyValue(p.properties, 'Due Date'),
    budget: getPropertyValue(p.properties, 'Budget'),
  })).filter(p => p.name) || [];

  // EXACT property names for INVOICES
  INVOICES = invoices.results?.map(p => ({
    id: p.id,
    number: getPropertyValue(p.properties, 'Invoice no'),
    status: getPropertyValue(p.properties, 'Status'),
    client: getPropertyValue(p.properties, 'Clients'),
    phone: getPropertyValue(p.properties, 'Phone'),
    amount: getPropertyValue(p.properties, 'Amount'),
  })).filter(i => i.number) || [];

  dataLoaded = true;
  document.getElementById('crm-count').textContent = CRM_DATA.length;
  document.getElementById('proj-count').textContent = PROJECTS.length;
  document.getElementById('inv-count').textContent = INVOICES.length;

  showPage('crm', document.querySelector('.nav-item.active'));
}

// ── RENDERING ──────────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { Active:'green', Lead:'amber', Proposal:'blue', Completed:'grey', Paid:'green', Pending:'amber', Unpaid:'red', Draft:'grey' };
  return `<span class="badge ${map[s]||'grey'}">${s}</span>`;
}

function renderCRM() {
  if (!dataLoaded) return '<div class="loading">Syncing Notion data</div>';
  const active = CRM_DATA.filter(c => c.status === 'Active').length;
  return `
    <div class="page-header">
      <div class="page-emoji">👥</div>
      <div class="page-h1">Client Relationships</div>
      <div class="page-desc">Live sync from your Notion workspace.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${CRM_DATA.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-val">${active}</div><div class="stat-label">Active</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><span class="table-title">All Clients</span></div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Client</th><th>Phone</th><th>Status</th><th>Value</th><th>Next Action</th></tr></thead>
        <tbody>
          ${CRM_DATA.map(c=>`<tr><td>${c.name}</td><td style="font-family:'DM Mono',monospace;font-size:11px">${c.phone}</td><td>${statusBadge(c.status)}</td><td style="color:var(--accent)">${c.value}</td><td style="font-size:11px">${c.nextAction}</td></tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
}

function renderProjects() {
  if (!dataLoaded) return '<div class="loading">Syncing Notion data</div>';
  return `
    <div class="page-header">
      <div class="page-emoji">📋</div>
      <div class="page-h1">Projects</div>
      <div class="page-desc">Live pipeline from Notion.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${PROJECTS.length}</div><div class="stat-label">Total</div></div>
    </div>
    <div class="kanban">
      <div class="kanban-col">
        <div class="col-header"><span class="col-title">All Projects</span><span class="col-count">${PROJECTS.length}</span></div>
        ${PROJECTS.map(p=>`<div class="kanban-card"><div class="card-title">${p.name}</div><div style="font-size:10px;color:var(--ink3)">${p.client}</div><div style="margin-top:6px">${statusBadge(p.status)}</div><div style="margin-top:4px;font-size:10px;color:var(--ink3)">Due: ${p.due} | Budget: ${p.budget}</div></div>`).join('')}
      </div>
    </div>`;
}

function renderInvoices() {
  if (!dataLoaded) return '<div class="loading">Syncing Notion data</div>';
  return `
    <div class="page-header">
      <div class="page-emoji">💰</div>
      <div class="page-h1">Invoices</div>
      <div class="page-desc">All billing from Notion.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${INVOICES.length}</div><div class="stat-label">Total</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><span class="table-title">All Invoices</span></div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Invoice</th><th>Client</th><th>Amount</th><th>Status</th><th>Phone</th></tr></thead>
        <tbody>
          ${INVOICES.map(i=>`<tr><td style="font-family:'DM Mono',monospace;font-size:11px">${i.number}</td><td>${i.client}</td><td style="font-weight:600">${i.amount}</td><td>${statusBadge(i.status)}</td><td style="font-family:'DM Mono',monospace;font-size:11px">${i.phone}</td></tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
}

const PAGES = { crm: renderCRM, projects: renderProjects, invoices: renderInvoices };
const TITLES = { crm: "CRM · Clients", projects: "Projects", invoices: "Invoices" };

function showPage(id, el) {
  document.getElementById('content').innerHTML = PAGES[id]();
  document.getElementById('topbar-title').textContent = TITLES[id];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  closeSidebar();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// Init
loadData();
</script>
</body>
</html>
